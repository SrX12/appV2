<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Chiringuito TPV">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icon.svg">
    <link rel="apple-touch-icon" href="./icon.svg">
    <title>Chiringuito TPV</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* CSS INTEGRADO - Estilo fluido y moderno */
        :root{--bg:#0f172a;--card:#1e293b;--accent:#f43f5e;--green:#10b981;--text:#f8fafc;--muted:#94a3b8;--border:rgba(148,163,184,.2);}
        [data-theme="beach"]{--bg:#0a0e27;--card:#1e2540;--accent:#ff6b35;}
        body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);margin:0;height:100vh;display:flex;flex-direction:column}
        .hdr{padding:16px;background:var(--card);display:flex;justify-content:space-between;align-items:center}
        .pages{flex:1;overflow-y:auto;padding:16px;padding-bottom:100px}
        .pg{display:none}.pg.on{display:block}
        .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .pcard{background:var(--card);border-radius:16px;padding:15px;display:flex;flex-direction:column;align-items:center;transition:all .2s;border:2px solid transparent}
        .pcard:active{transform:scale(0.92);border-color:var(--accent);box-shadow:0 0 15px rgba(244,63,94,0.3)}
        .emoji{font-size:2rem}
        .name{font-size:0.8rem;color:var(--muted);margin-top:4px}
        .price{font-weight:900;color:var(--accent);margin-top:2px}
        .nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;padding:10px;border-top:1px solid var(--border)}
        .nav-btn{flex:1;text-align:center;font-size:0.7rem;color:var(--muted)}
        .nav-btn.on{color:var(--accent)}
        .btn{padding:12px;border-radius:12px;background:var(--accent);color:white;font-weight:700;width:100%;text-align:center}
        .ipt{width:100%;padding:12px;border-radius:12px;background:var(--bg);color:white;border:1px solid var(--border);margin-bottom:10px}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:none;justify-content:center;align-items:center}
        .modal{background:var(--card);padding:20px;border-radius:20px;width:90%;max-width:400px}
        .toast{position:fixed;top:20px;left:5%;width:90%;background:var(--accent);color:white;padding:15px;border-radius:10px;display:none;text-align:center}
    </style>
</head>
<body data-theme="dark">
    <div id="toast" class="toast"></div>
    <header class="hdr"><div class="hdr-title">🏖️ Chiringuito TPV</div><div id="syncBadge">📡</div></header>
    <div class="pages">
        <div id="pg-venta" class="pg on"><div class="pgrid" id="prodGrid"></div></div>
        <div id="pg-sync" class="pg"><div class="glass"><button class="btn" onclick="SYNC.generate()">📤 Enviar Datos</button><button class="btn" style="margin-top:10px" onclick="SYNC.receive()">📥 Recibir Datos</button></div></div>
        <!-- (Más páginas aquí...) -->
    </div>
    <nav class="nav">
        <button class="nav-btn on" onclick="NAV.go('venta',this)">🛒 Venta</button>
        <button class="nav-btn" onclick="NAV.go('sync',this)">📡 Sincro</button>
    </nav>
    <div class="overlay" id="ov"><div class="modal" id="mb"></div></div>
    
    <script>
        // LÓGICA UNIFICADA
        const DB = {
            data: JSON.parse(localStorage.getItem('tpv_db')) || {products:{p1:{id:'p1',name:'Cerveza',price:2.5,emoji:'🍺'}},sales:{}},
            save(){localStorage.setItem('tpv_db', JSON.stringify(this.data))}
        };
        const R = {
            renderProducts(){
                document.getElementById('prodGrid').innerHTML = Object.values(DB.data.products).map(p => `
                    <button class="pcard" onclick="CART.add('${p.id}')">
                        <span class="emoji">${p.emoji}</span>
                        <span class="name">${p.name}</span>
                        <span class="price">${p.price}€</span>
                    </button>
                `).join('');
            }
        };
        const CART = {
            items:[],
            add(id){ 
                this.items.push(DB.data.products[id]);
                // Vibración táctil si existe
                navigator.vibrate?.(30);
                alert('Añadido: ' + DB.data.products[id].name);
            }
        };
        const SYNC = {
            generate(){
                const data = btoa(JSON.stringify(DB.data));
                document.getElementById('mb').innerHTML = `<h3>Código para compartir</h3><textarea style="width:100%;height:100px">${data}</textarea>`;
                document.getElementById('ov').classList.add('on');
            },
            receive(){
                const code = prompt("Pega el código:");
                if(code){
                    DB.data = JSON.parse(atob(code));
                    DB.save();
                    location.reload();
                }
            }
        };
        const NAV = {
            go(p, btn){
                document.querySelectorAll('.pg').forEach(el=>el.classList.remove('on'));
                document.getElementById('pg-'+p).classList.add('on');
                document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
                btn.classList.add('on');
            }
        };
        R.renderProducts();
    </script>
</body>
</html>
